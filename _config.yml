# --- General ---
title: Vikrant Jain
author: Vikrant Jain
url: "https://vikrantjain.github.io"
description: >-
  Writing on software architecture, AI coding agents, and engineering practice.

remote_theme: daattali/beautiful-jekyll@6.0.1

# --- Navigation bar ---
navbar-links:
  About: "about"

title-on-all-pages: true

# --- Footer / social links ---
social-network-links:
  github: vikrantjain
  linkedin: vikrantj
  rss: true
rss-description: >-
  Software architecture, AI coding agents, and engineering practice.

share-links-active:
  linkedin: true
  twitter: true
  reddit: true

# --- Post list / search ---
post_search: true
feed_show_excerpt: false
feed_show_tags: false
excerpt_length: 50

# --- Build / formatting ---
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
date_format: "%B %-d, %Y"
permalink: /:title/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      readtime: true
      head-extra: [mermaid.html, styles.html, toc.html]
      after-content: [discuss-cta.html]
  - scope:
      path: ""
    values:
      layout: "page"
      head-extra: [mermaid.html, styles.html]

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-feed

exclude:
  - README.md
  - CLAUDE.md
