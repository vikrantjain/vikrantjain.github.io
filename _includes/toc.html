<style>
  /* Article table of contents — a sticky pane that lives in the empty left
     margin beside the centered 730px reading column. Purely additive: built
     client-side from the article's headings, it never touches the content and
     simply doesn't render when there's no room (narrow screens) or too few
     sections. Desktop-only by design. */
  .post-toc {
    position: fixed;
    top: 120px;
    /* Sit just left of the centered content column: column left edge is at
       calc(50% - 365px); reserve the TOC width + a gap to its left. Clamped so
       it never runs off the viewport. */
    left: max(1.5rem, calc(50% - 605px));
    width: 210px;
    max-height: calc(100vh - 160px);
    overflow-y: auto;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    z-index: 5;
  }
  .post-toc-title {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #828282;
    margin-bottom: 0.6rem;
  }
  .post-toc ul {
    list-style: none;
    margin: 0;
    padding: 0;
    border-left: 1px solid #e6e8eb;
  }
  .post-toc li { margin: 0; }
  .post-toc a {
    display: block;
    padding: 0.3rem 0 0.3rem 0.9rem;
    margin-left: -1px;
    border-left: 2px solid transparent;
    font-size: 0.9rem;
    line-height: 1.45;
    color: #6b6f76;
    text-decoration: none;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .post-toc a:hover { color: #1a1a1a; text-decoration: none; }
  .post-toc a.is-active {
    color: #008AFF;
    border-left-color: #008AFF;
    font-weight: 600;
  }

  /* Only show the pane when there's genuine margin room for it. Below this the
     730px column leaves too little side space, so the TOC is hidden and the
     reading experience is exactly as before. */
  @media (max-width: 1199.98px) {
    .post-toc { display: none; }
  }

  /* Smooth in-page jumps; scoped to pages that load this include (posts only).
     scroll-margin keeps a clicked heading clear of the viewport top. */
  html { scroll-behavior: smooth; }
  .blog-post h2, .blog-post h3 { scroll-margin-top: 90px; }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    try {
      var article = document.querySelector('.blog-post');
      if (!article) return;

      var headings = article.querySelectorAll('h3');
      // Not worth a TOC for very short posts.
      if (headings.length < 4) return;

      var slugify = function (text) {
        return text.toLowerCase().trim()
          .replace(/[^\w\s-]/g, '')
          .replace(/\s+/g, '-')
          .replace(/-+/g, '-');
      };

      var nav = document.createElement('nav');
      nav.className = 'post-toc';
      nav.setAttribute('aria-label', 'Table of contents');

      var title = document.createElement('div');
      title.className = 'post-toc-title';
      title.textContent = 'On this page';
      nav.appendChild(title);

      var list = document.createElement('ul');
      var seen = {};
      var links = [];

      Array.prototype.forEach.call(headings, function (h) {
        var id = h.id;
        if (!id) {
          id = slugify(h.textContent) || 'section';
          while (seen[id]) { id = id + '-1'; }
          h.id = id;
        }
        seen[id] = true;

        var li = document.createElement('li');
        var a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = h.textContent;
        li.appendChild(a);
        list.appendChild(li);
        links.push({ id: id, el: a });
      });

      nav.appendChild(list);
      document.body.appendChild(nav);

      // Scrollspy: highlight the section currently in view. Feature-detected —
      // if IntersectionObserver is unavailable the links still work, just
      // without the active highlight.
      if ('IntersectionObserver' in window) {
        var byId = {};
        links.forEach(function (l) { byId[l.id] = l.el; });
        var current = null;

        var setActive = function (id) {
          if (current === id) return;
          links.forEach(function (l) { l.el.classList.remove('is-active'); });
          if (byId[id]) { byId[id].classList.add('is-active'); current = id; }
        };

        var visible = {};
        var observer = new IntersectionObserver(function (entries) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) { visible[entry.target.id] = true; }
            else { delete visible[entry.target.id]; }
          });
          // Pick the first heading (document order) currently in view.
          for (var i = 0; i < headings.length; i++) {
            if (visible[headings[i].id]) { setActive(headings[i].id); break; }
          }
        }, { rootMargin: '-80px 0px -65% 0px' });

        Array.prototype.forEach.call(headings, function (h) { observer.observe(h); });
      }
    } catch (e) {
      // TOC is non-essential; never let it affect the page.
    }
  });
</script>
