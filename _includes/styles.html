<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  /* --- Hashnode-style typography (Inter), layered over Beautiful Jekyll --- */

  /* Use Inter everywhere for a consistent Hashnode feel */
  body,
  .navbar,
  .post-heading .post-title,
  .post-heading .post-subtitle,
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* Article body: Hashnode reading sizing */
  .blog-post {
    font-size: 1.2rem;       /* ~19px */
    line-height: 1.75;
    font-weight: 400;
    color: #242424;
    letter-spacing: -0.003em;
  }
  .blog-post p,
  .blog-post ul,
  .blog-post ol {
    margin-bottom: 1.3rem;
  }
  .blog-post li { margin-bottom: 0.4rem; }

  /* Headings: bold and tight like Hashnode */
  .blog-post h1,
  .blog-post h2,
  .blog-post h3,
  .blog-post h4 {
    margin-top: 2.5rem;
    margin-bottom: 0.9rem;
    line-height: 1.3;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1a1a1a;
  }
  .blog-post h2 { font-size: 1.65rem; }
  .blog-post h3 { font-size: 1.32rem; }
  .blog-post h4 { font-size: 1.12rem; }

  /* Post title / subtitle — centered, Hashnode-style */
  .post-heading {
    text-align: center;
  }
  .post-heading .post-title {
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .post-heading .post-subtitle {
    font-weight: 400;
    color: #555;
  }

  /* Code: soft rounded blocks, subtle inline highlight */
  .blog-post pre {
    border-radius: 8px;
    padding: 1rem 1.2rem;
    border: 1px solid #e6e8eb;
    overflow: auto;
    font-size: 0.92rem;
  }
  .blog-post :not(pre) > code {
    background: rgba(135, 131, 120, 0.15);
    padding: 0.15em 0.4em;
    border-radius: 5px;
    font-size: 0.9em;
  }

  /* Quotes and images */
  .blog-post blockquote {
    border-left: 4px solid #008AFF;
    background: #f8f9fa;
    padding: 0.7rem 1.1rem;
    color: #4a4a4a;
    border-radius: 0 6px 6px 0;
    font-size: 1.12rem;
  }
  .blog-post img { border-radius: 8px; }

  /* Center rendered mermaid diagrams */
  .mermaid {
    display: flex;
    justify-content: center;
    margin: 1.8rem 0;
  }
</style>
