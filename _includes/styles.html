<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  /* --- Hashnode-style typography (Inter), layered over Beautiful Jekyll --- */

  /* Use Inter everywhere for a consistent Hashnode feel */
  body,
  .navbar,
  .post-heading .post-title,
  .post-heading .post-subheading,
  h1, h2, h3, h4, h5, h6 {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* Article body: Hashnode reading sizing */
  .blog-post {
    font-size: 1.2rem;       /* ~19px */
    line-height: 1.75;
    font-weight: 400;
    color: #242424;
    letter-spacing: -0.003em;
  }
  .blog-post p,
  .blog-post ul,
  .blog-post ol {
    margin-bottom: 1.3rem;
  }
  .blog-post li { margin-bottom: 0.4rem; }

  /* Headings: bold and tight like Hashnode */
  .blog-post h1,
  .blog-post h2,
  .blog-post h3,
  .blog-post h4 {
    margin-top: 2.5rem;
    margin-bottom: 0.9rem;
    line-height: 1.3;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1a1a1a;
  }
  .blog-post h2 { font-size: 1.65rem; }
  .blog-post h3 { font-size: 1.32rem; }
  .blog-post h4 { font-size: 1.12rem; }

  /* Post title / subtitle — centered, Hashnode-style */
  .post-heading {
    text-align: center;
  }
  /* Header heading block: a centered column wide enough for short titles to
     stay on one line, but capped so long titles wrap with side margins
     instead of running edge-to-edge. Scoped to .intro-header so the article
     body column is unaffected. */
  .intro-header .row > [class*="col-"] {
    flex: 0 0 100%;
    max-width: 860px;
    margin-left: auto;
    margin-right: auto;
  }
  .intro-header .post-heading h1 {
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #1a1a1a;
    /* Fluid: ~32px on phones, up to 56px on desktop (keeps the desktop
       one-line ratio while scaling down on small screens like Hashnode). */
    font-size: clamp(2rem, 7vw, 3.5rem);
    overflow-wrap: break-word;
  }
  .intro-header .post-heading .post-subheading {
    font-weight: 400;
    color: #6b6f76;
    font-size: 1.4rem;
    line-height: 1.4;
    margin-top: 0.6rem;
    /* Title spans the full-width header; keep the subtitle within the
       article content width and centered so it wraps instead of running
       into one over-long line on wide screens. */
    max-width: 730px;
    margin-left: auto;
    margin-right: auto;
  }

  /* Home / post list — Hashnode-style: smaller, left-aligned, muted */
  /* Widen the listing column so subtitles only wrap when genuinely long
     (scoped to the post list, so the article body column stays narrow). */
  .row > [class*="col-"]:has(> .posts-list) {
    flex: 0 0 100%;
    max-width: 1030px;   /* content ~1000px: the longest one-line subtitle fits; longer ones wrap */
    margin-left: auto;
    margin-right: auto;
  }
  .post-preview {
    text-align: left;
  }

    font-size: 1.5rem;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: -0.01em;
  }
  .post-preview .post-subtitle {
    font-size: 1rem;
    color: #6b6f76;
    margin-top: 0.3rem;
  }
  .post-preview .post-meta {
    font-size: 0.9rem;
    color: #828282;
  }

  /* Code: soft rounded blocks, subtle inline highlight */
  .blog-post pre {
    border-radius: 8px;
    padding: 1rem 1.2rem;
    border: 1px solid #e6e8eb;
    overflow: auto;
    font-size: 0.92rem;
  }
  .blog-post :not(pre) > code {
    color: #242424;
    background: rgba(135, 131, 120, 0.15);
    padding: 0.15em 0.4em;
    border-radius: 5px;
    font-size: 0.9em;
  }

  /* Quotes and images */
  .blog-post blockquote {
    border-left: 4px solid #008AFF;
    background: #f8f9fa;
    padding: 0.7rem 1.1rem;
    color: #4a4a4a;
    border-radius: 0 6px 6px 0;
    font-size: 1.12rem;
  }
  .blog-post img { border-radius: 8px; }

  /* Thin, full-width, airy horizontal rules — Hashnode-style */
  .blog-post hr {
    display: block;
    width: 100%;
    height: 1px;
    border: 0;
    background-color: #e0e0e0;
    opacity: 1;
    margin: 3rem auto;
  }

    font-size: 1.7rem;          /* list title is 1.5rem; a touch more */
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1a1a1a;
  }
  body:has(.posts-list) .intro-header .page-subheading {
    font-size: 1.1rem;          /* list subtitle is 1rem; a touch more */
    color: #6b6f76;
  }

  /* Center rendered mermaid diagrams */
  .mermaid {
    display: flex;
    justify-content: center;
    margin: 1.8rem 0;
  }

  /* "Discuss this post" footer (rendered from `discuss` frontmatter) */
  .discuss-cta {
    margin: 3rem 0 2.5rem;
    padding-top: 1.3rem;
    border-top: 1px solid #e0e0e0;
    font-size: 1.05rem;
    color: #4a4a4a;
  }
  .discuss-cta-label { margin-right: 0.5rem; }
  .discuss-cta a {
    color: #008AFF;
    font-weight: 600;
    text-decoration: none;
  }
  .discuss-cta a i { margin-right: 0.15rem; }
  .discuss-cta a:hover { text-decoration: underline; }
  .discuss-cta-sep {
    margin: 0 0.5rem;
    color: #b0b3b8;
  }
</style>
